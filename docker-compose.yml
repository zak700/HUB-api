services:
  db:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hub_user
      POSTGRES_PASSWORD: j5qbvH1rzDAr7AyZrJLw2ImlWshPl0ew
      POSTGRES_DB: jzzzlxmkmujldtve
  api:
    build: .
    container_name: hub-api
    restart: always

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "3000:3000"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`hubmain-api.cloud`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
